<style>
    /* ... existing root and header styles ... */

    /* UPDATED GRID LOGIC */
    .masonry-grid { 
        display: grid; 
        grid-template-columns: repeat(12, 1fr); 
        gap: 24px; 
        grid-auto-flow: dense; /* Helps fill gaps automatically */
    }

    .card { 
        background: #fff; 
        border: 1px solid var(--border); 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        min-height: 450px; /* Prevents the "squeezed" text look */
    }

    /* Robust Sizing */
    .span-7 { grid-column: span 7; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .span-8 { grid-column: span 8; }

    /* Fix for the "Split" view - Ensure text doesn't vanish */
    .split-card { display: flex; flex-direction: row; align-items: stretch; }
    
    .text-area { 
        flex: 1; 
        padding: 40px; 
        display: flex; 
        flex-direction: column; 
        justify-content: center;
        min-width: 300px; /* Ensures text has room to breathe */
    }

    .image-area { 
        flex: 1; 
        background: #eee; 
        cursor: pointer; 
        position: relative; 
        overflow: hidden;
        border-left: 1px solid var(--border);
    }

    /* Responsive fix for smaller screens */
    @media (max-width: 1100px) {
        .span-7, .span-5, .span-6, .span-4, .span-8 { grid-column: span 12; }
        .split-card { flex-direction: column; }
        .image-area { height: 250px; border-left: none; border-top: 1px solid var(--border); }
    }
</style>
