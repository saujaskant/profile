<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saujas Kant | STEM Portfolio</title>

<style>
:root{
--bg:#f8fafc;
--navy:#1e3a8a;
--emerald:#059669;
--text:#0f172a;
--muted:#64748b;
--card:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--bg);
color:var(--text);
line-height:1.8;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(8px);
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
border-bottom:1px solid #e5e7eb;
}

nav a{
text-decoration:none;
color:var(--text);
margin-left:25px;
font-weight:500;
font-size:0.95rem;
}

nav a:hover{
color:var(--navy);
}

/* OFFSET FOR FIXED NAV */
section{
padding:120px 8%;
scroll-margin-top:100px;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 8%;
margin-top:80px;
}

.hero h1{
font-size:3.5rem;
font-weight:800;
color:var(--navy);
}

.hero h2{
margin-top:15px;
color:var(--muted);
font-weight:500;
max-width:600px;
}

.badges{
margin-top:30px;
}

.badge{
display:inline-block;
background:var(--emerald);
color:white;
padding:8px 16px;
border-radius:20px;
font-size:0.85rem;
margin:6px 6px 0 0;
}

/* SECTION TITLES */
.section-title{
font-size:2.3rem;
font-weight:800;
margin-bottom:50px;
color:var(--navy);
}

/* CARDS */
.card{
background:var(--card);
padding:35px;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.05);
margin-bottom:35px;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.timeline{
border-left:3px solid var(--emerald);
padding-left:30px;
}

.timeline-item{
margin-bottom:40px;
}

.highlight{
color:var(--emerald);
font-weight:600;
}

/* FOOTER */
footer{
text-align:center;
padding:80px 8%;
background:white;
border-top:1px solid #e5e7eb;
}
